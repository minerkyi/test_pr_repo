<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 시멘틱 네비게이션</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
        }

        .nav-list {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-link {
            color: #666;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: #007bff;
        }

        .nav-link.active {
            color: #007bff;
            font-weight: 500;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        section {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            margin-bottom: 15px;
            color: #666;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-list {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #fff;
                border-top: 1px solid #e0e0e0;
                flex-direction: column;
                gap: 0;
                padding: 20px;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .nav-list.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            .nav-item {
                padding: 10px 0;
            }

            .nav-link {
                display: block;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="#home" class="logo">Logo</a>
                
                <ul class="nav-list" id="navList">
                    <li class="nav-item">
                        <a href="#home" class="nav-link active">홈</a>
                    </li>
                    <li class="nav-item">
                        <a href="#about" class="nav-link">소개</a>
                    </li>
                    <li class="nav-item">
                        <a href="#services" class="nav-link">서비스</a>
                    </li>
                    <li class="nav-item">
                        <a href="#contact" class="nav-link">연락처</a>
                    </li>
                </ul>
                
                <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
                    ☰
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="home">
            <h1>간단한 시멘틱 네비게이션</h1>
            <p>깔끔하고 접근성을 고려한 네비게이션 바입니다.</p>
        </section>

        <section id="about">
            <h2>소개</h2>
            <p>시멘틱 HTML 요소를 사용하여 구조화된 네비게이션입니다.</p>
            <p>스크린 리더와 SEO에 최적화되어 있습니다.</p>
        </section>

        <section id="services">
            <h2>서비스</h2>
            <p>최소한의 스타일링으로 깔끔한 디자인을 구현했습니다.</p>
            <p>모바일에서도 사용하기 쉬운 인터페이스를 제공합니다.</p>
        </section>

        <section id="contact">
            <h2>연락처</h2>
            <p>접근성을 고려한 aria-label과 키보드 네비게이션을 지원합니다.</p>
        </section>
    </main>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navList = document.getElementById('navList');
        const navLinks = document.querySelectorAll('.nav-link');

        // 모바일 메뉴 토글
        menuToggle.addEventListener('click', () => {
            const isActive = navList.classList.contains('active');
            navList.classList.toggle('active');
            menuToggle.setAttribute('aria-label', isActive ? '메뉴 열기' : '메뉴 닫기');
        });

        // 네비게이션 링크 클릭 처리
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                
                // 모바일 메뉴 닫기
                navList.classList.remove('active');
                menuToggle.setAttribute('aria-label', '메뉴 열기');
                
                // 활성 링크 업데이트
                navLinks.forEach(navLink => navLink.classList.remove('active'));
                link.classList.add('active');
                
                // 스무스 스크롤
                const targetId = link.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                
                if (targetElement) {
                    const headerHeight = document.querySelector('header').offsetHeight;
                    const targetPosition = targetElement.offsetTop - headerHeight;
                    
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // ESC 키로 모바일 메뉴 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                navList.classList.remove('active');
                menuToggle.setAttribute('aria-label', '메뉴 열기');
            }
        });

        // 외부 클릭 시 모바일 메뉴 닫기
        document.addEventListener('click', (e) => {
            if (!e.target.closest('nav')) {
                navList.classList.remove('active');
                menuToggle.setAttribute('aria-label', '메뉴 열기');
            }
        });
    </script>
</body>
</html>
